version: '3.8'

services:
  pgvector-db:
    image: pgvector/pgvector:pg16
    container_name: summerjob_pgvector
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-summerjob_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-summerjob_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
